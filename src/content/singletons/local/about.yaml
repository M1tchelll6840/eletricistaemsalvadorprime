aboutImage: /images/general/1775016446829-Eletricista-trabalhando-no-painel-el-trico.png
aboutText: |-
  A Eletricista em Salvador Prime é especializada em serviços elétricos residenciais, comerciais e emergenciais, oferecendo atendimento rápido, seguro e com garantia de qualidade.

  Atuamos em toda Salvador realizando instalações, manutenções, troca de fiação, quadros elétricos, iluminação, tomadas, chuveiros e soluções elétricas completas.

  Nosso compromisso é entregar segurança, agilidade e um atendimento profissional do início ao fim.
