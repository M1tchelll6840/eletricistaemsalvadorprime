aboutContent: |-
  A Eletricista em Salvador Prime oferece soluções elétricas completas para residências, empresas e comércios em Salvador e região. Trabalhamos com foco em segurança, qualidade e agilidade, garantindo um atendimento profissional desde o primeiro contato até a finalização do serviço.

  Nossa equipe atua em instalações elétricas, manutenção preventiva, troca de fiação, quadros elétricos, iluminação, chuveiros, tomadas, disjuntores e emergências elétricas 24 horas.

  Atendemos com responsabilidade, transparência e compromisso, sempre utilizando materiais de qualidade e seguindo padrões de segurança para proteger sua família e seu patrimônio.
