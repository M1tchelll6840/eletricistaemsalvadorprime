aboutTitle: Eletricista Profissional em Salvador com Atendimento Rápido e Seguro
aboutSubtitle: Especialistas em serviços elétricos residenciais, comerciais e emergenciais, com qualidade, responsabilidade e compromisso com a segurança dos nossos clientes.
aboutContent: |-
  A Eletricista Em Salvador Prime é uma empresa especializada em serviços elétricos, oferecendo soluções completas para residências, comércios e empresas. Trabalhamos com foco em segurança, agilidade e qualidade, garantindo um atendimento profissional desde o primeiro contato até a finalização do serviço.

  Nossa equipe é preparada para realizar instalações elétricas, manutenção preventiva e corretiva, troca de fiação, instalação de chuveiros, ventiladores, luminárias, quadros elétricos, disjuntores, padrões de energia e muito mais. Atendemos com rapidez e responsabilidade, sempre utilizando materiais adequados e seguindo as normas técnicas de segurança.

  Nosso compromisso é oferecer um serviço confiável, transparente e eficiente, proporcionando tranquilidade e satisfação aos nossos clientes. Estamos prontos para atender emergências elétricas e resolver problemas com rapidez, garantindo o funcionamento seguro da sua instalação elétrica.
